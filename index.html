
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel Vega - Sinais</title>
<style>
  body { font-family: Arial, sans-serif; background: #121212; color: #eee; margin: 0; padding: 20px; }
  header { font-size: 1.5em; margin-bottom: 20px; text-align: center; }
  .connection-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .connection-dot.connected { background: #4caf50; }
  .connection-dot.connecting { background: #ffc107; }
  .connection-dot.disconnected { background: #f44336; }
  .connection-dot.error { background: #b71c1c; }
  .status-bar { margin-bottom: 15px; }
  .signals { border-top: 1px solid #444; padding-top: 10px; max-width: 600px; margin: auto; }
  .signal { background: #222; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
  .signal.strong { border-left: 5px solid #4caf50; }
  .signal.medium { border-left: 5px solid #ff9800; }
  .signal.weak { border-left: 5px solid #f44336; }
  .signal-header { font-weight: bold; margin-bottom: 5px; }
  .stats { font-size: 0.9em; color: #aaa; text-align: center; margin-top: 30px; }
</style>
</head>
<body>
<header>
  <span class="connection-dot connected"></span>
  <span id="connection-status">Conectado</span>
</header>

<div class="status-bar">
  <div id="last-updated">Última atualização: --:--:--</div>
  <div id="server-stats">Sinais hoje: 0 | Usuários: 0</div>
</div>

<div class="signals" id="signals-container">
  <!-- Sinais aparecerão aqui -->
</div>

<script>
// Função para formatar data/hora
function formatTime(date) {
  return date.toLocaleTimeString('pt-BR', { hour12: false });
}

// Atualiza status da conexão
function updateConnectionStatus(status) {
  const dot = document.querySelector('.connection-dot');
  const statusText = document.getElementById('connection-status');
  dot.className = 'connection-dot ' + status;
  const statusMap = {
    connected: 'Conectado',
    connecting: 'Conectando...',
    disconnected: 'Desconectado',
    error: 'Erro de conexão'
  };
  statusText.textContent = statusMap[status] || status;
}

// Atualiza barra de status
function updateStatusBar() {
  const lastUpdated = document.getElementById('last-updated');
  lastUpdated.textContent = 'Última atualização: ' + formatTime(new Date());
  const serverStats = document.getElementById('server-stats');
  serverStats.textContent = 'Sinais hoje: 5 | Usuários: 123';
}

// Cria um sinal no container
function createSignal(signal) {
  const div = document.createElement('div');
  div.className = 'signal ' + signal.strength.toLowerCase();
  div.innerHTML = `
    <div class="signal-header">${signal.emoji} ${signal.pair} - ${signal.direction}</div>
    <div>Timeframe: ${signal.timeframe} | Entrada: ${formatTime(new Date(signal.entry))}</div>
    <div>Força: ${signal.strength}</div>
  `;
  return div;
}

// Simula sinais recebidos
function loadSignals() {
  const signals = [
    { emoji: '🔥', pair: 'EUR/USD', direction: 'CALL', timeframe: 'M5', entry: new Date(), strength: 'Forte' },
    { emoji: '❄️', pair: 'BTC/USD', direction: 'PUT', timeframe: 'M1', entry: new Date(), strength: 'Médio' },
    { emoji: '⚡', pair: 'ETH/USD', direction: 'CALL', timeframe: 'M5', entry: new Date(), strength: 'Fraco' }
  ];
  const container = document.getElementById('signals-container');
  container.innerHTML = '';
  signals.forEach(sig => container.appendChild(createSignal(sig)));
}

// Inicializa painel
function init() {
  updateConnectionStatus('connected');
  updateStatusBar();
  loadSignals();
  // Atualiza última atualização a cada 30s
  setInterval(updateStatusBar, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
